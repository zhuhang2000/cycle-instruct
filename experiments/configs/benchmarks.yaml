# Default paths for the 6 core benchmarks. Override per-experiment.
benchmarks:
  - name: vqav2
    split: val2014
    data_path: data/bench/vqav2
    image_dir: data/bench/coco/val2014
    metric: accuracy
    max_samples: 5000
  - name: gqa
    split: testdev
    data_path: data/bench/gqa/testdev_balanced_questions.json
    image_dir: data/bench/gqa/images
    metric: accuracy
  - name: mmbench
    split: dev
    data_path: data/bench/mmbench/dev.tsv
    image_dir: data/bench/mmbench/images
    metric: mc_acc
  - name: pope
    split: adv
    data_path: data/bench/pope/pope_adversarial.jsonl
    image_dir: data/bench/coco/val2014
    metric: accuracy
  - name: docvqa
    split: val
    data_path: data/bench/docvqa/val_v1.0.json
    image_dir: data/bench/docvqa/images
    metric: anls
  - name: hallusion
    split: all
    data_path: data/bench/hallusion/HallusionBench.json
    image_dir: data/bench/hallusion/images
    metric: accuracy
