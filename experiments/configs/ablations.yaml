name: ablations_v1
backbone: Qwen-VL-2B
target_size: 100000
seed: 0
output_root: runs/experiments

# Each ablation re-uses "ours" but reads a pool where one sub-score was dropped.
methods:
  - name: full
    kind: ours
    params: {round_data: runs/ablation/full/train.json}
  - name: drop_ar
    kind: ours
    params: {round_data: runs/ablation/drop_ar/train.json}
  - name: drop_clip
    kind: ours
    params: {round_data: runs/ablation/drop_clip/train.json}
  - name: drop_qr
    kind: ours
    params: {round_data: runs/ablation/drop_qr/train.json}
  - name: drop_ppl
    kind: ours
    params: {round_data: runs/ablation/drop_ppl/train.json}

benchmarks:
  - {name: mmbench, split: dev, data_path: data/bench/mmbench/dev.tsv, image_dir: data/bench/mmbench/images, metric: mc_acc}
  - {name: pope,    split: adv, data_path: data/bench/pope/pope_adversarial.jsonl, image_dir: data/bench/coco/val2014, metric: accuracy}
  - {name: gqa,     split: testdev, data_path: data/bench/gqa/testdev_balanced_questions.json, image_dir: data/bench/gqa/images, metric: accuracy}
